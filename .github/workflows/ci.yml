name: Rails CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: unione_db_test
          POSTGRES_USER: unione
          POSTGRES_PASSWORD: 241996
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432
      DATABASE_USERNAME: unione
      DATABASE_PASSWORD: 241996
      DATABASE_NAME: unione_db_test
      REDIS_URL: redis://127.0.0.1:6379/1
      SECRET_KEY_BASE: test_secret_key_base_for_ci_only

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Prepare database
        run: bundle exec rails db:create db:schema:load

      - name: Run RSpec
        run: bundle exec rspec --format progress
