development:
  secret_key_base: <%= ENV.fetch('SECRET_KEY_BASE', 'dev_secret_key_base_change_in_production_12345678901234567890abcdef1234567890abcdef1234567890abcdef123456') %>
  jwt_secret: <%= ENV.fetch('JWT_SECRET', 'jwt_secret_key_for_development_change_in_production') %>

test:
  secret_key_base: test_secret_key_base_for_test_environment_123456789012345678901234567890
  jwt_secret: jwt_secret_for_test_environment

production:
  secret_key_base: <%= ENV['SECRET_KEY_BASE'] %>
  jwt_secret: <%= ENV['JWT_SECRET'] %>
